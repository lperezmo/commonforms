<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3eb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#19171f" media="(prefers-color-scheme: dark)" />
  <title>CommonForms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/app.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f7f3eb; }
    @media (prefers-color-scheme: dark) { html, body { background: #19171f; } }
    body { font-family: "Geist", system-ui, sans-serif; }
    #cf-root { height: 100vh; height: 100dvh; }
    /* Login overlay */
    .cf-login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--cf-bg, #f7f3eb); z-index: 100; }
    .cf-login form { display: flex; flex-direction: column; gap: 12px; width: min(320px, 86vw); }
    .cf-login input { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--cf-line-input, #c9bfa8); background: var(--cf-surface, #fff); font: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="cf-root"></div>
  <script type="text/babel" src="/static/app.jsx"></script>
</body>
</html>
